<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>FGA Revenue Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/img/favicon.svg"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root{--bg:#0a0a0a;--panel:#141414;--line:rgba(255,255,255,.1);--ink:#fff;--muted:rgba(255,255,255,.62);--gold:#c4a97d;--green:#2ecc71;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5}
  .wrap{max-width:1180px;margin:0 auto;padding:32px 20px 56px}
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:28px}
  h1{font-family:Georgia,serif;font-size:clamp(32px,5vw,52px);font-weight:400;line-height:1;margin:0}
  .muted{color:var(--muted)}
  .gate{max-width:420px;margin:14vh auto;padding:28px;background:var(--panel);border:1px solid var(--line);border-radius:12px}
  .gate h1{font-size:34px;margin-bottom:10px}
  .gate input{width:100%;margin:18px 0 12px;padding:13px 14px;border:1px solid var(--line);border-radius:8px;background:#0f0f0f;color:#fff;font-size:16px}
  button{border:0;border-radius:8px;background:#fff;color:#0a0a0a;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:13px 18px;cursor:pointer}
  .error{color:#ff8a80;font-size:13px;min-height:20px}
  .hidden{display:none}
  .cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}
  .card,.chart,.table-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);font-weight:700}
  .value{font-family:Georgia,serif;font-size:34px;margin-top:8px}
  .progress{height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:14px}
  .bar{height:100%;width:0;background:var(--green)}
  .charts{display:grid;grid-template-columns:2fr 2fr 1.35fr;gap:14px;margin:18px 0}
  .chart{min-height:300px}
  canvas{width:100%!important;max-height:260px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:12px 10px;border-bottom:1px solid var(--line)}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
  @media(max-width:900px){header{display:block}.cards,.charts{grid-template-columns:1fr}.chart{min-height:260px}}
</style>
</head>
<body>
<main class="wrap">
  <section id="gate" class="gate">
    <h1>Revenue Dashboard</h1>
    <p class="muted">Enter the admin password to load purchase metrics.</p>
    <input id="password" type="password" autocomplete="current-password" placeholder="Admin password"/>
    <button id="login">View Dashboard</button>
    <div id="error" class="error"></div>
  </section>

  <section id="dashboard" class="hidden">
    <header>
      <div>
        <div class="label">Fast Grad Academy</div>
        <h1>Revenue Dashboard</h1>
      </div>
      <div class="muted" id="updated"></div>
    </header>

    <div class="cards">
      <div class="card"><div class="label">Total Revenue</div><div class="value" id="totalRevenue">$0</div></div>
      <div class="card"><div class="label">Total Sales</div><div class="value" id="totalSales">0</div></div>
      <div class="card"><div class="label">Days Since Launch</div><div class="value" id="daysSinceLaunch">0</div></div>
      <div class="card">
        <div class="label">Target Progress</div>
        <div class="value" id="targetProgress">0%</div>
        <div class="progress"><div class="bar" id="targetBar"></div></div>
        <div class="muted" style="font-size:12px;margin-top:8px">Target: $1,970 / 10 sales</div>
      </div>
    </div>

    <div class="charts">
      <div class="chart"><div class="label">Daily Sales</div><canvas id="dailySales"></canvas></div>
      <div class="chart"><div class="label">Cumulative Revenue</div><canvas id="cumulativeRevenue"></canvas></div>
      <div class="chart"><div class="label">Source Breakdown</div><canvas id="sourceBreakdown"></canvas></div>
    </div>

    <div class="table-card">
      <div class="label" style="margin-bottom:10px">Purchases</div>
      <table>
        <thead><tr><th>Date</th><th>Email</th><th>Amount</th><th>Source</th></tr></thead>
        <tbody id="salesTable"></tbody>
      </table>
    </div>
  </section>
</main>
<script src="/admin/js/dashboard.js"></script>
</body>
</html>
