<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex"/>
<!-- Google Ads Global Site Tag — replace AW-CONVERSION_ID with your real ID -->
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-CONVERSION_ID"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'AW-CONVERSION_ID');
</script>
<title>Recover Your Access Code — Fast Grad Academy</title>
<link rel="icon" type="image/svg+xml" href="img/favicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{
    --black:#0a0a0a;
    --white:#ffffff;
    --silver:#c0c0c0;
    --muted:#a8a8a8;
    --gold:#c4a97d;
    --glass:rgba(255,255,255,0.04);
    --glass-border:rgba(255,255,255,0.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--black);color:var(--white);
    font-family:'Inter',-apple-system,sans-serif;
    line-height:1.6;font-weight:400;
    min-height:100vh;display:flex;flex-direction:column;
  }
  a{color:inherit;}
  .logo-bar{padding:28px 24px;text-align:center;}
  .logo-bar .logo{
    font-family:'Instrument Serif',Georgia,serif;font-size:22px;
    color:var(--white);letter-spacing:-0.01em;text-decoration:none;
  }
  .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:16px 24px 64px;}
  .card{max-width:440px;width:100%;}
  .kicker{
    font-size:11px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;
    color:var(--gold);margin-bottom:14px;text-align:center;
  }
  h1{
    font-family:'Instrument Serif',Georgia,serif;font-weight:400;
    font-size:clamp(32px,6vw,44px);line-height:1.08;letter-spacing:-0.02em;
    margin-bottom:14px;text-align:center;
  }
  .sub{
    font-size:15px;color:rgba(255,255,255,0.7);line-height:1.7;
    text-align:center;margin-bottom:32px;
  }
  label{display:block;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  input[type=email]{
    width:100%;padding:14px 18px;background:rgba(255,255,255,0.04);
    border:1px solid var(--glass-border);border-radius:10px;color:#fff;
    font-size:15px;font-family:'Inter',sans-serif;outline:none;
    margin-bottom:14px;transition:border 0.2s;
  }
  input[type=email]:focus{border-color:rgba(196,169,125,0.5);}
  button{
    width:100%;padding:15px;background:var(--white);color:var(--black);
    font-family:'Inter',sans-serif;font-size:13px;font-weight:700;
    letter-spacing:0.1em;text-transform:uppercase;border:none;border-radius:10px;
    cursor:pointer;transition:opacity 0.2s;
  }
  button:hover{opacity:0.88;}
  button:disabled{opacity:0.5;cursor:default;}
  .msg{
    display:none;margin-top:18px;padding:14px 16px;border-radius:10px;
    font-size:13.5px;line-height:1.6;text-align:left;
  }
  .msg.ok{display:block;background:rgba(109,184,138,0.1);border:1px solid rgba(109,184,138,0.3);color:#bfe6cd;}
  .msg.err{display:block;background:rgba(255,80,80,0.08);border:1px solid rgba(255,80,80,0.25);color:#ff9b9b;}
  .links{margin-top:26px;text-align:center;font-size:13.5px;}
  .links a{color:rgba(255,255,255,0.55);text-decoration:underline;text-underline-offset:2px;}
  .links a:hover{color:var(--white);}
  footer{text-align:center;padding:28px 24px 36px;font-size:12px;color:rgba(255,255,255,0.3);line-height:1.7;}
  footer a{color:rgba(255,255,255,0.45);text-decoration:underline;}
</style>
</head>
<body>

<div class="logo-bar">
  <a href="/" class="logo">Fast Grad Academy</a>
</div>

<div class="wrap">
  <div class="card">
    <div class="kicker">Access recovery</div>
    <h1>Recover your code</h1>
    <p class="sub">Enter the email you used at checkout and we'll resend your access code.</p>

    <form id="recover-form" novalidate>
      <label for="email">Email used at checkout</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email" spellcheck="false" required/>
      <button id="submit-btn" type="submit">Resend my access code</button>
    </form>

    <div id="msg" class="msg" role="status" aria-live="polite"></div>

    <div class="links">
      <a href="/guide">Have your code? Log in here &rarr;</a>
      <a href="/learn">Read the free guides</a>
    </div>
  </div>
</div>

<footer>
  &copy; 2026 Fast Grad Academy.<br/>
  <a href="/learn">Learn</a> &middot;
  Still stuck? <a href="mailto:hello@fastgradacademy.com">hello@fastgradacademy.com</a>
</footer>

<script>
(function(){
  var form = document.getElementById('recover-form');
  var input = document.getElementById('email');
  var btn = document.getElementById('submit-btn');
  var msg = document.getElementById('msg');

  function show(kind, text){
    msg.className = 'msg ' + kind;
    msg.textContent = text;
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    var email = input.value.trim();
    if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
      show('err', 'Please enter a valid email address.');
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Sending...';
    msg.className = 'msg';

    fetch('/api/resend-access', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ email: email })
    })
    .then(function(r){ return r.json().then(function(d){ return { status:r.status, data:d }; }); })
    .then(function(res){
      if(res.status === 200){
        show('ok', (res.data && res.data.message) || 'If an account exists with this email, we have sent the access code.');
        btn.textContent = 'Email sent';
      } else if(res.status === 429){
        show('err', (res.data && res.data.error) || 'Please wait a few minutes before trying again.');
        btn.disabled = false;
        btn.textContent = 'Resend my access code';
      } else {
        show('err', (res.data && res.data.error) || 'Something went wrong. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Resend my access code';
      }
    })
    .catch(function(){
      show('err', 'Network error. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Resend my access code';
    });
  });
})();
</script>

</body>
</html>
